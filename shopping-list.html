<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping list example</title>
    <style>
      li {
        margin-bottom: 10px;
      }

      li button {
        font-size: 12px;
        margin-left: 20px;
        color: #666;
      }
    </style>
  </head>
  <body>

    <h1>My shopping list</h1>

    <form>
      <label for="item">Enter a new item:</label>
      <input type="text" name="item" id="item">
      <button>Add item</button>
    </form>

    <ul>

    </ul>

    <script>
      
       
        const unorderedList = document.querySelector('ul');
        const input = document.querySelector('input');
        const button = document.querySelector('button');


        function btn (e){
         e.preventDefault();
      
     
          const inputs = input.value;
          input.value = "";


          const listItems = document.createElement('li');
          const span = document.createElement('span');
          const delButtton  = document.createElement('button');

          span.textContent = inputs;
          delButtton.textContent = 'Delete';

          listItems.appendChild(span);
          listItems.appendChild(delButtton);
          unorderedList.appendChild(listItems);


          delButtton.addEventListener("click",function(e){
            e.target.closest('li').remove();
          })


          input.focus();
        }
  
        button.addEventListener('click',btn);




    </script>
  </body>
</html>
